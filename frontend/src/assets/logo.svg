<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="135%" y2="135%">
      <stop offset="0%" style="stop-color:#060f20"/>
      <stop offset="100%" style="stop-color:#0b1f3a"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f6ff"/>
      <stop offset="100%" style="stop-color:#5cc0f0"/>
    </linearGradient>

    <filter id="glowSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="roundedClip">
      <rect x="40" y="40" width="320" height="320" rx="52"/>
    </clipPath>

    <linearGradient id="fadeMask" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:white;stop-opacity:0"/>
    </linearGradient>
    <mask id="reflectMask">
      <rect x="40" y="232" width="320" height="130" fill="url(#fadeMask)"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect x="40" y="40" width="320" height="320" rx="52" fill="url(#bg)"/>
  <rect x="40" y="40" width="320" height="320" rx="52"
        fill="none" stroke="#1c3f6e" stroke-width="1.2" opacity="0.8"/>

  <g clip-path="url(#roundedClip)">

    <!-- Water tint bottom -->
    <rect x="40" y="232" width="320" height="128" fill="#4ab8f0" opacity="0.04"/>

    <!-- Mirror line -->
    <line x1="80" y1="232" x2="320" y2="232"
          stroke="#4ab8f0" stroke-width="0.8" opacity="0.5"/>

    <!-- Ripples -->
    <ellipse cx="200" cy="232" rx="30" ry="6"
             fill="none" stroke="#4ab8f0" stroke-width="1.1" opacity="0.65"/>
    <ellipse cx="200" cy="232" rx="62" ry="11"
             fill="none" stroke="#3a9ed8" stroke-width="0.8" opacity="0.38"/>
    <ellipse cx="200" cy="232" rx="100" ry="17"
             fill="none" stroke="#2a7ebb" stroke-width="0.6" opacity="0.2"/>

    <!-- Main characters -->
    <text
      x="200" y="218"
      font-family="'STSong', 'Songti SC', 'SimSun', 'Noto Serif CJK SC', serif"
      font-size="110"
      font-weight="400"
      fill="url(#textGrad)"
      text-anchor="middle"
      dominant-baseline="auto"
      letter-spacing="8"
      filter="url(#glowSoft)">澜镜</text>

    <!-- Reflection -->
    <g transform="translate(0,464) scale(1,-1)" mask="url(#reflectMask)">
      <text
        x="200" y="218"
        font-family="'STSong', 'Songti SC', 'SimSun', 'Noto Serif CJK SC', serif"
        font-size="110"
        font-weight="400"
        fill="url(#textGrad)"
        text-anchor="middle"
        dominant-baseline="auto"
        letter-spacing="8">澜镜</text>
    </g>

  </g>

  <!-- Outer ring -->
  <rect x="40" y="40" width="320" height="320" rx="52"
        fill="none" stroke="#4ab8f0" stroke-width="0.5" opacity="0.18"/>
</svg>
