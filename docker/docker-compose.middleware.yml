# ============================================================
# 数字孪生洪水预报预警平台 — 中间件 Docker Compose
# Demo 阶段: 仅用于后续集成, 当前前端使用 Mock 数据
# ============================================================

version: "3.9"

services:
  # ---------- 消息队列 ----------
  kafka:
    image: bitnami/kafka:3.7
    container_name: flood-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    volumes:
      - kafka-data:/bitnami/kafka

  # ---------- 时序数据库 ----------
  influxdb:
    image: influxdb:2.7
    container_name: flood-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=flood12345
      - DOCKER_INFLUXDB_INIT_ORG=flood-org
      - DOCKER_INFLUXDB_INIT_BUCKET=sensor-data
    volumes:
      - influxdb-data:/var/lib/influxdb2

  # ---------- 关系型数据库 ----------
  postgres:
    image: postgres:16
    container_name: flood-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=flood_platform
      - POSTGRES_USER=flood
      - POSTGRES_PASSWORD=flood12345
    volumes:
      - pg-data:/var/lib/postgresql/data

  # ---------- 缓存 ----------
  redis:
    image: redis:7-alpine
    container_name: flood-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass flood12345
    volumes:
      - redis-data:/data

  # ---------- 服务注册与发现 ----------
  nacos:
    image: nacos/nacos-server:v2.3.1
    container_name: flood-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      - MODE=standalone
      - NACOS_AUTH_ENABLE=false
    volumes:
      - nacos-data:/home/nacos/data

volumes:
  kafka-data:
  influxdb-data:
  pg-data:
  redis-data:
  nacos-data:
